# Used when this service's Root Directory is set to `app/web` in Railway.
# See: https://docs.railway.com/deployments/monorepo

[build]
builder = "nixpacks"
# NPM_CONFIG_CACHE keeps npm's cache out of node_modules (fixes EBUSY rmdir .../node_modules/.cache on some builders).
buildCommand = "NPM_CONFIG_CACHE=/tmp/npm-cache npm ci && npm run build"

[deploy]
startCommand = "npm run start"
