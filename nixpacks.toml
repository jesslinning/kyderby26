# Fallback only — production deploy should use the repo-root Dockerfile so Python is in the runtime image.
# Nixpacks + Node often produces a run image with no python3 on PATH.

[variables]
NIXPACKS_NODE_VERSION = "20"
NIXPACKS_PYTHON_VERSION = "3.12"

[start]
cmd = "sh -c 'PYTHONPATH=. exec python3 -m uvicorn app.odds_api:app --host 0.0.0.0 --port ${PORT:-8000}'"
