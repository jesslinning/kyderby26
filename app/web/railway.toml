# Used when this service's Root Directory is set to `app/web` in Railway.
# See: https://docs.railway.com/deployments/monorepo

[build]
builder = "nixpacks"
# Avoid `npm ci` here: it deletes/recreates node_modules and hits EBUSY on .../node_modules/.cache
# with Nixpacks/Docker overlay FS. `npm install` still respects package-lock.json (npm 7+).
buildCommand = "NPM_CONFIG_CACHE=/tmp/npm-cache npm install --no-audit --no-fund && npm run build"

[deploy]
startCommand = "npm run start"
