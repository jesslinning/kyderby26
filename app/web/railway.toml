# Static-only deploy (no live odds API): Railway Root Directory = `app/web`.
# For FastAPI + live odds + API routes, deploy from repo root using `/railway.toml`.

[build]
builder = "nixpacks"
buildCommand = "NPM_CONFIG_CACHE=/tmp/npm-cache npm install --no-audit --no-fund && npm run build"

[deploy]
startCommand = "npm run start"
