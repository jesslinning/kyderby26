# Static-only: NO /api, NO live odds. (serve dist only)
#
# If you need live odds on Railway, do NOT use this as the service root.
# Use repository root + /railway.toml (parent directory) with blank Root Directory.

[build]
builder = "nixpacks"
buildCommand = "NPM_CONFIG_CACHE=/tmp/npm-cache npm install --no-audit --no-fund && npm run build"

[deploy]
startCommand = "npm run start"
